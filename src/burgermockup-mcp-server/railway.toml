# Railway config-as-code for the burgermockup MCP service.
# Dashboard prerequisite: Root Directory = src/burgermockup-mcp-server
# (or deploy via `railway up ./src/burgermockup-mcp-server`, which uploads this
#  dir as the build context directly).
# See docs/deployment-guide.md -> "Hosting the MCP server on Railway".

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# /health is exempt from the Bearer gate, so the probe passes without a token.
# No startCommand: Dockerfile CMD ["python", "-m", "server.main"] is correct.
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
