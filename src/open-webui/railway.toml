# Railway config-as-code for the vendored open-webui service.
# Dashboard prerequisites (cannot be expressed here):
#   - Root Directory = src/open-webui  (build context must be this directory)
#   - Config-as-code path = src/open-webui/railway.toml  (config file does NOT follow Root Directory)
# See docs/deployment-guide.md -> "Hosting on Railway".

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Monorepo: rebuild this service ONLY when its own files change.
# Without this, every push to the repo rebuilds open-webui (a 15-20 min build)
# even when only a sibling service was touched. Paths are repo-root-relative.
watchPatterns = ["src/open-webui/**"]

[deploy]
# Single replica is mandatory: SQLite DB, the attached volume, and the default
# in-memory socket manager all break with >1 replica. Scaling out requires
# DATABASE_URL (Postgres) + REDIS_URL + websocket manager — see deployment-guide.md.
numReplicas = 1
# First boot runs Alembic migrations (+ may download embedding model on slim builds).
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# No startCommand: Dockerfile CMD ["bash", "start.sh"] with WORKDIR /app/backend is correct.
