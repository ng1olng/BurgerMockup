# Overlay: burgermockup MCP server alongside Open WebUI.
# Usage: docker compose -f docker-compose.yaml -f docker-compose.mcp.yaml up -d --build
#
# Open WebUI connects via compose DNS: http://burgermockup-mcp:8100/mcp
# (Admin > Settings > External Tools > MCP Streamable HTTP).
services:
  burgermockup-mcp:
    build:
      context: ../../burgermockup-mcp-server
      dockerfile: Dockerfile
    container_name: burgermockup-mcp
    ports:
      # Loopback only — the server has no auth. Published so the host browser
      # can fetch /files/{id} links returned by the tools.
      - 127.0.0.1:8100:8100
    # Single source of truth: the server's .env (GEMINI_API_KEY, BP_API_KEY,
    # LOG_LEVEL, ...). Env is injected at container creation, not image build —
    # after editing .env, a plain `up -d` recreates the container; no --build.
    env_file:
      - path: ../../burgermockup-mcp-server/.env
        required: false # fresh clones without .env still boot
    environment:
      # Container-safe pins — `environment` wins over `env_file`. The .env is
      # host-oriented: MCP_BIND_HOST=127.0.0.1 is unreachable from other
      # containers and its relative FILES_DIR would dodge the volume. New
      # host-only vars added to .env need a matching pin here.
      - MCP_BIND_HOST=0.0.0.0
      - FILES_DIR=/data/files
      - METRICS_PATH=/data/metrics/metrics.jsonl
      # File links render in the host browser, so the public base is the
      # host-published address, not the compose-internal one.
      - PUBLIC_FILES_BASE=http://127.0.0.1:8100
    volumes:
      - burgermockup-files:/data/files
      - burgermockup-metrics:/data/metrics
    restart: unless-stopped

  open-webui:
    depends_on:
      burgermockup-mcp:
        condition: service_healthy

volumes:
  burgermockup-files: {}
  burgermockup-metrics: {}
